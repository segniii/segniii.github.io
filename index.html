<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ebas Canvas</title>

<style>
  /* RESET */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #111; background: #fff; scroll-behavior: smooth; }

  a { text-decoration: none; color: inherit; }

  /* NAVBAR */
  nav {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.95);
    display: flex;
    justify-content: flex-end;
    gap: 20px;
    padding: 20px 10%;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  nav a { font-weight: bold; transition: 0.3s; }
  nav a:hover { color: #ff4c00; }

  /* HERO */
  .hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: url('images/hero.jpg') center/cover no-repeat;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
  }
  .hero h1 {
    color: #fff;
    font-size: 4rem;
    z-index: 1;
    opacity: 0;
    transform: translateY(50px);
    animation: fadeInUp 1s forwards 0.3s;
  }
  @keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* SECTIONS */
  section {
    padding: 80px 10%;
    opacity: 0;
    transform: translateY(50px);
    transition: all 0.8s ease-out;
  }
  section.visible { opacity: 1; transform: translateY(0); }

  h2 { font-size: 2.5rem; margin-bottom: 20px; }

  /* GALLERY GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }
  .grid img {
    width: 100%;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.4s, box-shadow 0.4s;
  }
  .grid img:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    top:0; left:0;
    width:100vw; height:100vh;
    background: rgba(0,0,0,0.95);
    display: flex; justify-content: center; align-items: center;
    display: none;
    z-index: 1000;
  }
  .lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 40px 10%;
    background: #111;
    color: #fff;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .hero h1 { font-size: 3rem; }
    h2 { font-size: 2rem; }
  }

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <a href="#about">About</a>
  <a href="#gallery">Gallery</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Ebas Canvas 🎨</h1>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About</h2>
  <p>I create visual art that blends imagination with realism. Every piece tells a story and invites the viewer to explore emotions and color.</p>
</section>

<!-- GALLERY -->
<section id="gallery">
  <h2>Gallery</h2>
  <div class="grid">
    <img src="images/art1.jpg" onclick="openLightbox(this.src)">
    <img src="images/art2.jpg" onclick="openLightbox(this.src)">
    <img src="images/art3.jpg" onclick="openLightbox(this.src)">
    <img src="images/art4.jpg" onclick="openLightbox(this.src)">
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Ebas Canvas</p>
</footer>

<script>
  // LIGHTBOX
  function openLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").style.display = 'flex';
  }
  function closeLightbox() {
    document.getElementById("lightbox").style.display = 'none';
  }

  // SCROLL ANIMATION
  const sections = document.querySelectorAll('section');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.2 });

  sections.forEach(section => observer.observe(section));
</script>

</body>
</html>
