<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ebas Canvas</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('images/hero.jpg') center/cover no-repeat;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      background: rgba(0,0,0,0.5);
      padding: 20px;
      border-radius: 10px;
    }

    /* GALLERY */
    .gallery {
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    .lightbox.active {
      display: flex;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      background: #000;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <h1>Ebas Canvas 🎨</h1>
  </div>

  <!-- GALLERY -->
  <div class="gallery">
    <img src="images/art1.jpg" onclick="openLightbox(this.src)">
    <img src="images/art2.jpg" onclick="openLightbox(this.src)">
    <img src="images/art3.jpg" onclick="openLightbox(this.src)">
    <img src="images/art4.jpg" onclick="openLightbox(this.src)">
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Ebas Canvas</p>
  </footer>

  <script>
    function openLightbox(src) {
      document.getElementById("lightbox-img").src = src;
      document.getElementById("lightbox").classList.add("active");
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("active");
    }
  </script>

</body>
</html>
