<!DOCTYPE html>
<html>
<head>

</head>
<body>

      <ul class="navbar-nav ms-auto">

      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
    <h2>Writings</h2>
    <div class="list-group">
        {% for writing in writings_files %}
        <a class="list-group-item list-group-item-action list-group-item-light" target="_blank"
