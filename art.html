<!DOCTYPE html>
<html>
<head>
<link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Art</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">Segni Deressa</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/art">Art</a></li>
        <li class="nav-item"><a class="nav-link" href="/publications">Publications</a></li>
        <li class="nav-item"><a class="nav-link" href="/videos">Videos</a></li>
      </ul>
    </div>
  </div>
<div class="container mt-4">
    <div class="row g-4">
        {% for art in art_files %}
        <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="card shadow-sm hover-scale">
                <a href="{{ url_for('static', filename='images/' + art) }}" data-lightbox="art-gallery">
                    <img src="{{ url_for('static', filename='images/' + art) }}" class="card-img-top" alt="art">
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</nav>
    <h1>My Art</h1>
    <nav>
        <a href="/">Home</a> |
        <a href="/art">Art</a> |
        <a href="/publications">Publications</a> |
        <a href="/videos">Videos</a>
    </nav>
    {% for art in art_files %}
        <img src="{{ url_for('static', filename='images/' + art) }}" alt="art" width="400px">
    {% endfor %}
</body>
</html>
